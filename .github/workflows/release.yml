name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 2. Set up Node.js
      # -----------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 4. Build card
      # -----------------------------------------------------------------------
      - name: Build card
        run: npm run build
        env:
          NODE_ENV: production

      # -----------------------------------------------------------------------
      # 5. Create/update release draft via release-drafter
      # -----------------------------------------------------------------------
      - name: Draft release with release-drafter
        uses: release-drafter/release-drafter@v6
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 6. Upload built card JS to draft release
      # -----------------------------------------------------------------------
      - name: Upload card to draft release
        run: gh release upload ${{ github.ref_name }} dist/ha-departures-card.js --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
