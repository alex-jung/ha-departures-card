homeassistant:
  name: "Dev"
  unit_system: metric
  time_zone: Europe/Berlin

# Lovelace im YAML-Modus — kein UI-Editor nötig
lovelace:
  mode: yaml
  resources:
    - url: /local/ha-departures-card/ha-departures-card.js
      type: module

# Mock-Sensoren mit ha-departures-kompatiblen Attributen
template:
  - sensor:
      - name: "Tram 6 Doku-Zentrum"
        unique_id: dev_tram_6_doku_zentrum
        state: "departures"
        attributes:
          line_name: "6"
          line_id: de:vgn:900_6:0_0
          transport: TRAM
          direction: Doku-Zentrum
          data_provider: https://transitous.org/
          latitude: 49.44078
          longitude: 11.081707
          icon: mdi:tram
          times: >
            {{ [
              {"planned": (now() + timedelta(minutes=3)).isoformat(),  "estimated": (now() + timedelta(minutes=5)).isoformat(),  "trip_id": "20260316_14:43_de-DELFI_3118795864", "cancelled": false, "head_sign": "Doku-Zentrum", "alerts": true},
              {"planned": (now() + timedelta(minutes=13)).isoformat(), "estimated": (now() + timedelta(minutes=13)).isoformat(), "trip_id": "20260316_14:53_de-DELFI_3118795863", "cancelled": false, "head_sign": "Doku-Zentrum", "alerts": true},
              {"planned": (now() + timedelta(minutes=23)).isoformat(), "estimated": (now() + timedelta(minutes=23)).isoformat(), "trip_id": "20260316_15:03_de-DELFI_3118795862", "cancelled": false, "head_sign": "Doku-Zentrum", "alerts": false},
              {"planned": (now() + timedelta(minutes=33)).isoformat(), "estimated": (now() + timedelta(minutes=33)).isoformat(), "trip_id": "20260316_15:13_de-DELFI_3118795795", "cancelled": false, "head_sign": "Doku-Zentrum", "alerts": false},
              {"planned": (now() + timedelta(minutes=43)).isoformat(), "estimated": (now() + timedelta(minutes=43)).isoformat(), "trip_id": "20260316_15:23_de-DELFI_3118795860", "cancelled": true,  "head_sign": "Doku-Zentrum", "alerts": false}
            ] }}

      - name: "U6 Garching Forschungszentrum"
        unique_id: dev_ubahn_u6_garching
        state: "departures"
        attributes:
          line_name: "U6"
          direction: "Garching Forschungszentrum"
          transport: subway
          data_provider: https://transitous.org/
          icon: mdi:subway
          times: >
            {{ [
              {"planned": (now() + timedelta(minutes=5)).isoformat(),  "estimated": (now() + timedelta(minutes=5)).isoformat(),  "trip_id": "U6-001", "cancelled": false, "head_sign": "Garching Forschungszentrum", "alerts": false},
              {"planned": (now() + timedelta(minutes=12)).isoformat(), "estimated": (now() + timedelta(minutes=17)).isoformat(), "trip_id": "U6-002", "cancelled": false, "head_sign": "Garching Forschungszentrum", "alerts": false},
              {"planned": (now() + timedelta(minutes=22)).isoformat(), "estimated": (now() + timedelta(minutes=21)).isoformat(), "trip_id": "U6-003", "cancelled": false, "head_sign": "Garching Forschungszentrum", "alerts": false},
              {"planned": (now() + timedelta(minutes=32)).isoformat(), "estimated": (now() + timedelta(minutes=32)).isoformat(), "trip_id": "U6-004", "cancelled": true,  "head_sign": "Garching Forschungszentrum", "alerts": false}
            ] }}
